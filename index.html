<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Engine</title>

<style>
body{
    margin:0;
    background:black;
    font-family:Consolas, monospace;
    color:#00ff66;
    overflow-x:hidden;
}

/* MATRIX BACKGROUND */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* HEADER */
.header{
    text-align:center;
    padding:40px 20px;
}

.logo{
    font-size:32px;
    text-shadow:0 0 10px #00ff66,
                0 0 20px #00ff66,
                0 0 40px #00ff66;
}

/* CARD */
.card{
    background:rgba(0,0,0,0.8);
    border:2px solid #00ff66;
    margin:20px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px #00ff66;
    transition:0.3s;
}

.card:hover{
    box-shadow:0 0 40px #00ff66;
    transform:scale(1.02);
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#00ff66;
    color:black;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 15px #00ff66;
    transition:0.3s;
}

button:hover{
    box-shadow:0 0 30px #00ff66;
    transform:scale(1.05);
}

input{
    padding:10px;
    border-radius:8px;
    border:1px solid #00ff66;
    background:black;
    color:#00ff66;
    margin:10px;
}

/* LOADING */
#loading{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    z-index:999;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:20px;
    opacity:0.6;
}
</style>
</head>

<body>

<div id="loading">⚡ Initializing System...</div>

<canvas id="matrix"></canvas>

<div class="header">
    <div class="logo">⚡ NHISM GREEN TOOL ⚡</div>
    <p>Official Secure Version</p>
</div>

<div class="card">
    <h2>NhismTool v3.0</h2>
    <p>Dung lượng: 35MB</p>
    <p>Lượt tải: <span id="counter">1205</span></p>
    <br>
    <a href="link-file-cua-ban.exe" download>
        <button onclick="download()">⬇ TẢI NGAY</button>
    </a>
</div>

<div class="card">
    <h3>🔐 Nhập Key</h3>
    <input type="text" id="key" placeholder="Nhập key tại đây">
    <br>
    <button onclick="checkKey()">Kích hoạt</button>
    <p id="status"></p>
</div>

<div class="footer">
© 2026 Nhism Official
</div>

<script>
/* LOADING */
setTimeout(()=>{document.getElementById("loading").style.display="none";},2000);

/* DOWNLOAD COUNTER */
function download(){
    let count = document.getElementById("counter");
    count.innerText = parseInt(count.innerText) + 1;
}

/* KEY CHECK (demo) */
function checkKey(){
    let key = document.getElementById("key").value;
    let status = document.getElementById("status");
    if(key === "NHISM2026"){
        status.innerHTML = "✔ Kích hoạt thành công!";
    }else{
        status.innerHTML = "✖ Key không hợp lệ!";
    }
}

/* MATRIX EFFECT */
var canvas = document.getElementById("matrix");
var ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

var letters = "01NHISMTOOL";
letters = letters.split("");

var fontSize = 14;
var columns = canvas.width/fontSize;
var drops = [];
for(var x=0;x<columns;x++)
drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#00ff66";
ctx.font=fontSize+"px arial";
for(var i=0;i<drops.length;i++){
var text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;
drops[i]++;
}
}
setInterval(draw,33);
</script>

</body>
</html>
